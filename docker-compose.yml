services:
  sermontracker:
    build: .
    container_name: sermontracker
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - sermon-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/data/sermontracker.db
      - AUTH_MODE=proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sermon-data:
